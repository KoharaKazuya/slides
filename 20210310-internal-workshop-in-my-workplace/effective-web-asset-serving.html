<h1><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>効率的な Web アセット配信の技術たち </span></foreignObject></svg></h1>
<p>2021/03/10 社内勉強会</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-marpit-pagination="2" data-marpit-pagination-total="34" style="--paginate:true;">
<p>Web サイトを表示するにはさまざまなアセット (HTML, JS, CSS, 画像など) を効率的にユーザーの手元に届ける必要があります。</p>
<p>基礎技術や工夫をそれぞれ紹介します。Web フロントエンド技術寄りです。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-marpit-pagination="3" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>前提知識: ネットワーク周り </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-marpit-pagination="4" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>インターネット</h2>
<p>今回の主題ではないが最低限のイメージがないと後述の技術の必要性が理解できない</p>
<ul>
<li>コンピューターネットワーク・電気通信</li>
<li>自律・分散で管理された多数のネットワークの相互接続</li>
<li>バケツリレーのようなイメージ</li>
<li>IP 網</li>
</ul>
<p>(発表時には社内研修用の資料を参照する)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-marpit-pagination="5" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Web サイトが表示されるまで</h2>
<ul>
<li>DNS・TCP・TLS・HTTP・HTML・サブリソース・画面描画</li>
</ul>
<p>(発表時には社内研修用の資料を参照する)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-marpit-pagination="6" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>キャッシュ・リバースプロキシ・CDN </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-marpit-pagination="7" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>HTTP キャッシュ</h2>
<p>キャッシュ: 結果が同じになるとわかっているなら、以前の結果を使いまわせば良い</p>
<ul>
<li>サーバーの負荷軽減・高速化</li>
<li>ブラウザ・プロキシ上に保存</li>
<li><a href="https://developer.mozilla.org/ja/docs/Web/HTTP/Headers/Cache-Control"><code>Cache-Control</code></a> ヘッダー
<ul>
<li>fresh, stale の概念</li>
<li><code>max-age</code>: 指定秒数、fresh とみなしてよい</li>
<li><code>stale-while-revalidate</code>: 指定秒数、stale を使って良い (裏で更新する)</li>
<li><code>immutable</code>: 時間経過で変化しない</li>
</ul>
</li>
<li><a href="https://developer.mozilla.org/ja/docs/Web/HTTP/Headers/If-None-Match"><code>If-None-Match</code></a>, <a href="https://developer.mozilla.org/ja/docs/Web/HTTP/Headers/If-Modified-Since"><code>If-Modified-Since</code></a> ヘッダー
<ul>
<li>通信の往復は発生するが、ペイロード分の通信を減らせる</li>
</ul>
</li>
</ul>
<p><strong>ブラウザ、CDN をコントロールするもので、非常に奥が深く難しい。頑張りどころ</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-marpit-pagination="8" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>CDN</h2>
<p>Content Delivery Networks</p>
<p>物理的・ネットワーク的にユーザーに近い位置にプロキシサーバーを置いてキャッシュすることで、素早くコンテンツを配信する</p>
<ul>
<li>ユーザーの RTT の改善 (100 ms オーダー → 10 ms など)</li>
<li>サーバーの負荷軽減・障害耐性</li>
<li>Brotli, TLS 1.3, HTTP/2, HTTP/3 などの最新対応</li>
<li>ネットワーク最適化</li>
</ul>
<p><strong>クラウド時代になって使いやすく、当たり前のものになった</strong></p>
<p>参考: <a href="https://web.dev/content-delivery-networks/">Content delivery networks (CDNs)</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-marpit-pagination="9" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Cache Busting</h2>
<p>キャッシュを使わせないようにするため、URL を変更する</p>
<ul>
<li>長い <code>max-age</code> や <code>immutable</code> と併用することでヒット率を上げつつ更新可能に
<ul>
<li>長期的なキャッシュの指定は更新できない問題を起こさないように注意</li>
</ul>
</li>
<li><code>index.html</code> が含むサブリソースの URL を変更する
<ul>
<li>例: <code>main.js?v=202101010000</code> などクエリに更新日時を入れる</li>
<li>例: <code>main.ae1c93.js</code> などファイル名にコンテンツのハッシュを入れる</li>
</ul>
</li>
</ul>
<p>URL の設定は手動でやるものではなく、対応しているツールを選択することが重要。</p>
<p>インフラ設定では意識する。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-marpit-pagination="10" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Service Worker, CacheStorage</h2>
<p>サイト開発者が JavaScript でプログラム可能なブラウザ上で動くプロキシ</p>
<ul>
<li>サイトに訪問された際にブラウザに Service Worker をインストールできる</li>
<li>Service Worker はあらゆる通信を横取り・改変可能
<ul>
<li>トップレベルナビゲーション (= HTML のリクエスト) 含む</li>
</ul>
</li>
<li>Service Worker から CacheStorage を使うことでキャッシュを柔軟に指定できる</li>
<li>オフライン状態でもキャッシュから返したり、裏で先読みなども</li>
</ul>
<p>直接扱うよりも <a href="https://developers.google.com/web/tools/workbox">Workbox</a> などで高機能で設定可能なプロキシとして扱うことが多い</p>
<p>参考: <a href="https://developer.mozilla.org/ja/docs/Web/API/Service_Worker_API">サービスワーカー API - Web API | MDN</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-marpit-pagination="11" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>新しいプロトコル・コーデック </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-marpit-pagination="12" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>HTTP/2</h2>
<ul>
<li>HTTP/1.1 の HTTP レベルの head-of-line blocking 問題
<ul>
<li>1 つの TCP 接続上の HTTP は前のリクエストが完了 (= レスポンスを受け取り終える) しないと次のリクエストが送れない</li>
<li>ブラウザは同じドメインに対して TCP 接続を 6 本に制限している</li>
<li>→ HTTP/2 では 1 つの TCP 接続の上で複数の HTTP 接続を多重化</li>
</ul>
</li>
<li>バイナリーでデータをやりとり</li>
<li>HPACK: ヘッダー圧縮</li>
<li>HTTP のセマンティクスは変わらない (<a href="https://qiita.com/flano_yuki/items/46dee0fded732edff48b">参考</a>)</li>
</ul>
<p><a href="https://almanac.httparchive.org/ja/2020/http2#http2%E3%81%AE%E6%8E%A1%E7%94%A8">現状 HTTP/2 はリクエストの 64 % ぐらいらしい</a> (残りはぼほ HTTP/1.1)</p>
<p>参考: <a href="https://http2-explained.haxx.se/ja">日本語 - http2 explained</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-marpit-pagination="13" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>HTTP/3</h2>
<ul>
<li><a href="https://quicwg.org/base-drafts/draft-ietf-quic-http.html">仕様としてはまだドラフト段階</a></li>
<li>HTTP/2 の TCP レベルの head-of-line blocking 問題
<ul>
<li>パケットをロストすると後続が全部詰まる</li>
<li>→ UDP ベースのプロトコル QUIC に</li>
</ul>
</li>
<li>HTTP over QUIC = HTTP/3</li>
<li>3-way ハンドシェイクの RTT の削減</li>
<li>回線や IP などを越えた QUIC 接続のマイグレーション</li>
<li>プロトコルの硬直化の回避: 将来的な改善の余地の確保</li>
<li>HTTP のセマンティクスは変わらない (<a href="https://qiita.com/flano_yuki/items/46dee0fded732edff48b">参考</a>)</li>
</ul>
<p>参考: <a href="https://http3-explained.haxx.se/ja">日本語 - HTTP/3 explained</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-marpit-pagination="14" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>HTTP 103, link rel=preload</h2>
<p>ほぼ間違いなく使用される HTML のサブリソースをいかに早く送りつけるか</p>
<ul>
<li><s>HTTP/2 Server Push</s> ← Chrome が導入を検証していたが廃止に向かっているらしい</li>
<li>代替 → <a href="https://developer.mozilla.org/ja/docs/Web/HTTP/Status/103">103 Early Hints</a> + <a href="https://developer.mozilla.org/ja/docs/Web/HTTP/Headers/Link">Link ヘッダー</a>
<ul>
<li>実験段階</li>
<li>HTTP 1xx は情報ステータス: 後続するステータスが最終ステータスになる</li>
</ul>
</li>
<li><a href="https://developer.mozilla.org/ja/docs/Web/HTML/Preloading_content"><code>&lt;link rel=preload&gt;</code></a>
<ul>
<li>HTTP 103 と比較して、サーバーの特別な対応はいらない一方で、HTML の生成が重い場合に先行してレスポンスしたい場合には使えない</li>
</ul>
</li>
</ul>
<p>参考: <a href="https://asnokaze.hatenablog.com/entry/2020/11/13/001110">Chrome の HTTP/2 サーバプッシュサポート廃止検討と、103 Early Hints について - ASnoKaze blog</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-marpit-pagination="15" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>gzip, Brotli, WebP, HEVC</h2>
<p>コンテンツをより小さくエンコードする</p>
<ul>
<li>HTTP ボディ (テキスト) の圧縮 → gzip, Brotli
<ul>
<li><strong>CDN が</strong> 圧縮機能を提供していることがある</li>
</ul>
</li>
<li>マルチメディア系ファイルの圧縮
<ul>
<li>ラスター画像 → PNG, GIF, WebP, AVIF</li>
<li>ベクター画像 → SVG</li>
<li>ビデオ → 要調査 (H.264, WebM, HEVC, AV1 など？)</li>
</ul>
</li>
<li>圧縮パラメーターの調整: PNG の色数など</li>
<li>Zopfli, Mozjpeg などのフォーマット互換の高性能代替</li>
</ul>
<p>アイコンなら PNG ではなく SVG、アニメーションには GIF ではなく MP4 など、<br />
コンテンツに合わせて適切なメディアを選択する必要がある</p>
<p>新しい技術はクライアントの環境によって使えないことがある</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-marpit-pagination="16" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>ビルド・不要な部分の削除 </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-marpit-pagination="17" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>バンドル</h2>
<p>多数のモジュールを読み込むため、1 つにまとめる</p>
<ul>
<li>消費する接続数を減らす
<ul>
<li>HTTP/1.1 では 1 HTTP = 1 TCP &amp; 同時 6 接続まで</li>
<li>まだまだ HTTP/1.1 は残っている (<a href="https://almanac.httparchive.org/ja/2020/http2#http2%E3%81%AE%E6%8E%A1%E7%94%A8">参考</a>)</li>
<li>HTTP/2 では 1 TCP の上に HTTP が多重化される</li>
</ul>
</li>
<li>主に JavaScript モジュールだが、CSS や HTML テンプレートなども含む</li>
<li>バンドルしないと原理的に import の waterfall 問題が発生する
<ul>
<li>これは <code>&lt;link rel=preload&gt;</code> で回避できるはず</li>
<li>要: 参考資料</li>
</ul>
</li>
<li>各モジュールの個別のキャッシュができなくなる</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-marpit-pagination="18" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Minify, Mangle, Tree Shaking, Dead Code Elimination</h2>
<p>JavaScript のビルド時に使っていない部分を削除して全体サイズを減らす</p>
<ul>
<li>Minify: 動作が変わらない範囲で空白を削ったり書き方を変えたりして小さくする</li>
<li>Magling: Minify の処理のひとつ・変数名などを短いものに置き換える
<ul>
<li>結果的にコードが読みづらくなる</li>
</ul>
</li>
<li>Tree Shaking: 実際に使用するコードのみをビルド結果に含める
<ul>
<li>ソースコード上には存在するが呼び出されていない関数などが消える</li>
</ul>
</li>
<li>Dead Code Elimination: アプリ開発者の観点では「= Tree Shaking」と考えて良い</li>
</ul>
<p>このような処理があるため、本番環境の JavaScript は読みづらいものになっている</p>
<p>参考: <a href="https://medium.com/@Rich_Harris/tree-shaking-versus-dead-code-elimination-d3765df85c80">Tree-shaking versus dead code elimination | by Rich Harris | Medium</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-marpit-pagination="19" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>WebFont のサブセット化</h2>
<p>表示する文字のグリフデータのみをダウンロードする</p>
<ul>
<li>Unicode 範囲によって分割することで、必要な範囲のみ読み込む</li>
<li>CSS で Unicode 範囲を指定でき、必要に応じてブラウザがダウンロード</li>
<li>(社内にノウハウがあるため、発表時には参加者に教えてもらう)</li>
</ul>
<p>ほぼ ASCII 文字事足りる英語と違い、日本語は文字数が異常に多いので<br />
<strong>パフォーマンス観点では日本語の WebFont はかなりの茨の道</strong></p>
<p>参考: <a href="https://web.dev/reduce-webfont-size/">Reduce WebFont Size</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-marpit-pagination="20" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>環境に合わせた読み込み </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-marpit-pagination="21" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>レスポンシブ画像</h2>
<p>表示する画面サイズに合わせた画像だけを読み込む</p>
<ul>
<li>スマホとデスクトップのディスプレイでは大きく違う物理サイズ</li>
<li>アートディレクションの問題
<ul>
<li>スマホで小さすぎて見えない vs デスクトップで大きすぎる</li>
<li>表示時の物理サイズに適した画像を選択したい</li>
<li>解決策: <code>&lt;picture&gt;</code> + <code>&lt;source media=…&gt;</code></li>
</ul>
</li>
<li>解像度切り替えの問題
<ul>
<li>スマホで不要な高解像度 vs デスクトップで荒すぎる低解像度</li>
<li>なるべく通信量を減らしたい</li>
<li>解決策: <code>&lt;img sizes=… srcset=…&gt;</code></li>
</ul>
</li>
</ul>
<p>参考: <a href="https://developer.mozilla.org/ja/docs/Learn/HTML/Multimedia_and_embedding/Responsive_images">レスポンシブ画像 - ウェブ開発を学ぶ | MDN</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-marpit-pagination="22" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Differential Loading</h2>
<p>古いブラウザ向けに JS の補間コードを使うが、新しいブラウザには読み込ませない</p>
<ul>
<li>古いブラウザ向け補間コードは、新しいブラウザにはオーバーヘッドになる</li>
<li>ES Modules をサポートしているかどうかで分岐して読み込ませる
<ul>
<li><code>&lt;script type=module&gt;</code> + <code>&lt;script nomodule&gt;</code> で安全に分岐可能</li>
<li>ES Modules を対応している環境は ES2015 を対応していると想定できる</li>
</ul>
</li>
<li>補間コードが含まれている・いない JS ファイルをそれぞれ作る必要がある
<ul>
<li>1 つのソースコードを 2 回ビルドする</li>
</ul>
</li>
</ul>
<p>IE をサポートしなければ、常に ES Modules 対応環境を相手にできるので関係ない</p>
<p>参考: <a href="https://jasonformat.com/modern-script-loading/">Modern Script Loading</a></p>
<p>※ <code>Differential Loading</code>: わかりやすい名前がないので <a href="https://angular.io/guide/deployment#differential-loading">Angular の命名</a> を拝借</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-marpit-pagination="23" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>必要なものを先に、そうでないものを後に </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-marpit-pagination="24" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Lazy Loading, Code Splitting, Granular Chunking</h2>
<p>JS を適切に分割し、一部は必要になるまで読み込まない</p>
<ul>
<li>JS サイズは初期表示速度に大きく影響する → いかに小さくするか
<ul>
<li>SPA でまだ表示していない別ページに関するモジュールなどは不必要</li>
<li>WYSIWYG エディタなど重い部分は後にしたい</li>
<li>「バンドル」の必要性もあるので無闇に細かく分割すればいいわけではない</li>
</ul>
</li>
<li>ES2020 の dynamic import や類似の機能を使って読み込みをコントロールする</li>
<li>チャンク: 概ね複数の ES モジュールをバンドルしたファイル (<a href="https://webpack.js.org/glossary/#c">webpack 用語</a>)</li>
</ul>
<p>チャンクの境界をどこにするか、適切に読み込む実装など、非常に難しい問題なため<br />
<strong>ビルドツールに任せる・ビルドツールの設定方法をよく知ることが重要</strong></p>
<p>参考: <a href="https://webpack.js.org/guides/lazy-loading/">Lazy Loading | webpack</a><br />
参考: <a href="https://web.dev/granular-chunking-nextjs/">Improved Next.js and Gatsby page load performance with granular chunking</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-marpit-pagination="25" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Lazy loading images, Intersection Observer</h2>
<p>スクロールして画面内に入るまで読み込まない</p>
<ul>
<li><code>&lt;img loading=lazy&gt;</code>: 画面内に入るまで画像を読み込ませない</li>
<li>Intersection Observer:「画面内に入ったか」を JS で取得するための API
<ul>
<li>最初は読み込まず画面内に入ったときだけ読み込む、などの制御ができる</li>
<li>画像だけでなく、Element 一般で使える</li>
</ul>
</li>
<li>レイアウト情報は先に必要なので <code>&lt;img width=… height=…&gt;</code> などを設定する
<ul>
<li>レイアウト情報がないと読み込み時に Layout Shift が発生する</li>
<li>画像と同じ考え方で遅延用見込み要素にはプレイスホルダーを用意する</li>
</ul>
</li>
</ul>
<p>参考: <a href="https://web.dev/lazy-loading-images/">Lazy-loading images</a><br />
参考: <a href="https://www.mizdra.net/entry/2020/05/31/192613">画像による Layout Shift が無くなる Web がやって来る - mizdra's blog</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-marpit-pagination="26" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>script の defer, async</h2>
<p>スクリプトの評価の前に HTML の表示を先にする</p>
<ul>
<li><code>&lt;script async&gt;</code>: いつ動作するか保証はなく、フェッチ完了した時点でパースに割り込んで評価</li>
<li><code>&lt;script defer&gt;</code>: フェッチのみ先行し、パース完了後評価</li>
<li><code>&lt;script async defer&gt;</code>: <code>&lt;script async&gt;</code> と同等になる</li>
</ul>
<p>すべての環境で使え、パフォーマンス的、安定性の良さ <code>&lt;script defer&gt;</code> がベスト。</p>
<p>参考: <a href="https://flaviocopes.com/javascript-async-defer/">Efficiently load JavaScript with defer and async</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-marpit-pagination="27" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Critial CSS, Internal CSS</h2>
<p>読み込み直後の画面上に現れない部分の CSS は後で読み込む</p>
<ul>
<li>CSS はレンダリングをブロックする → いかに小さくするか
<ul>
<li>読み込み直後はページの最上部だけが表示される</li>
<li>画面外の要素のスタイルが数秒遅れても問題ない</li>
</ul>
</li>
<li>ページの最上部に関わる CSS のみ抽出し読み込み、それ以外を後にする
<ul>
<li>CSS の遅延読み込みの標準の方法はない → <a href="https://github.com/filamentgroup/loadCSS">loadCSS</a> などを使う</li>
</ul>
</li>
<li><code>&lt;link rel=stylesheet&gt;</code> による External CSS だと往復遅延が発生するので、<code>&lt;style&gt;</code> による Internal CSS で HTML に埋め込む
<ul>
<li>TCP slow-start のため HTML (gzipped) の大きさを 14 KB に抑えるべき (<a href="https://web.dev/extract-critical-css/#14KB:~:text=To%20minimize%20the%20number%20of%20roundtrips,above%2Dthe%2Dfold%20content%20under%2014%20KB%20(compressed).">参考</a>)</li>
<li><code>&lt;style&gt;</code> での埋め込みは Inline CSS と呼ばれることも (<code>style</code> 属性とは別)</li>
</ul>
</li>
</ul>
<p>参考: <a href="https://web.dev/defer-non-critical-css/">Defer non-critical CSS</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-marpit-pagination="28" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>SSR, SSG, Hydration</h2>
<p>JS による HTML 組み立て処理を早い段階でやっておく</p>
<ul>
<li>JS による UI 描画完了が体感できるレベルで時間がかかる → 減らしたい</li>
<li>Server Side Rendering: リクエストを受け付けたときにサーバー上でやっておく
<ul>
<li>ローエンドモバイル端末よりサーバーの方がスペックが良い</li>
<li>HTML があれば操作はできなくても表示はしておける</li>
<li>Hydration: HTML にデータを埋め込むなどして、ブラウザ上のライブラリの状態を「HTML 組み立てが完了した」にして、サーバー上での状態と同期する</li>
</ul>
</li>
<li>Static Site Generating: HTML 組み立てをビルド時にやっておく</li>
</ul>
<p>Next.js のように SSR, SSG がシームレスに提供されていると、インタラクティブな UI ライブラリが <s>ほぼ無料で</s> 低コストに 性能改善できる (参考: <a href="https://ja.wikipedia.org/wiki/%E9%83%A8%E5%88%86%E8%A9%95%E4%BE%A1">部分評価</a>)</p>
<p>Node.js サーバー、SPA なのに複数の HTML ファイルへのルーティングなど<br />
<strong>インフラ、バック、フロントの境界を越えた連携と設計が必要</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-marpit-pagination="29" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>計測する、立ち位置を知る </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-marpit-pagination="30" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Web Vitals, Performance API</h2>
<p>JS でユーザーの実環境のデータを計測する</p>
<ul>
<li>Web Vitals: Google の UX 評価指標
<ul>
<li>わかりやすく、Google のツールで広く使われるので手を出しやすい</li>
<li><a href="https://www.npmjs.com/package/web-vitals">ライブラリ</a> でデータをサクッと取得できる</li>
<li>Core Web Vitals は 3 つの値 → ゲーミフィケーションされた環境がすでにある</li>
<li>PageSpeed Insights で簡単に確認できる</li>
</ul>
</li>
<li>JS からアクセスできる Performance Timeline API, Navigation Timing API, User Timing API, Resource Timing API などで細かくデータを収集できる</li>
<li>データの送信は <code>fetch</code> や <code>navigator.sendBeacon</code> など</li>
</ul>
<p>参考: <a href="https://developer.mozilla.org/ja/docs/Learn/Performance/Measuring_performance">パフォーマンスの測定 - ウェブ開発を学ぶ | MDN</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-marpit-pagination="31" data-marpit-pagination-total="34" style="--paginate:true;">
<h2>Web Almanac, CrUX</h2>
<p>巨大なデータを使って全体像を知る</p>
<ul>
<li>HTTP Archive: Web がどう構築・配信されているか記録し提供するプロジェクト
<ul>
<li>ものすごい量のデータを集めて記録しているらしい (クレイジー…)</li>
</ul>
</li>
<li>Web Almanac: HTTP Archive のデータを年単位でまとめ、専門家がデータに対するコメントを加えてわかりやすくしたレポート
<ul>
<li>自力では巨大なデータを読み解けないのでこのような「まとめ」を読む</li>
<li>「初期表示 2 sec が速いのか、遅いのか」といったことが客観できるように</li>
</ul>
</li>
<li>Chrome UX Report (CrUX): 実際の Chrome の使用者から集めたデータ</li>
</ul>
<p>参考: <a href="https://almanac.httparchive.org/ja/2020/methodology">方法論 | HTTP Archive による Web Almanac</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-marpit-pagination="32" data-marpit-pagination-total="34" style="--paginate:true;">
<h2><svg data-marp-fitting="svg"><foreignObject><span data-marp-fitting-svg-content>必要なくなくった技術 </span></foreignObject></svg></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-marpit-pagination="33" data-marpit-pagination-total="34" style="--paginate:true;">
<h3>CSS スプライト</h3>
<p>アイコンなどの小さな画像ファイルを 1 つにまとめて接続数を減らす → 不要に</p>
<ul>
<li>HTTP/2 の普及により HTTP 接続数を気にしなくなった</li>
<li>webpack などのバンドルツールが Data URL で配布する</li>
<li>SVG の利用</li>
</ul>
<h3>Domain Sharding</h3>
<p>各サブリソースのドメインを別にして、オリジン単位の接続数制限を回避 → 不要に</p>
<ul>
<li>HTTP/2 の普及により HTTP 接続数を気にしなくなった</li>
<li>逆にオーバーヘッドが大きくなる</li>
</ul>
<p>参考: <a href="https://developer.mozilla.org/ja/docs/Glossary/Domain_sharding">Domain sharding (ドメインシャーディング) - MDN Web Docs 用語集: ウェブ関連用語の定義 | MDN</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-marpit-pagination="34" data-marpit-pagination-total="34" style="--paginate:true;">
